<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>CAD Diagnosis Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
:root {
  --bg:#f4f1ec;
  --surface:#ffffff;
  --surface-soft:#faf9f6;
  --ink:#0a0a0a;
  --text:#181816;
  --text-mute:#6f6c66;
  --text-faint:#9c9892;
  --border:#eeece7;
  --border-2:#e2dfd9;
  --brand:#ff2e63;
  --brand-soft:#ffe8ee;
  --brand-deep:#c91144;
  --blue:#2563eb;
  --violet:#7c3aed;
  --cyan:#0891b2;
  --orange:#c2410c;
  --green:#059669;
  --f-display:"Inter","Pretendard Variable",-apple-system,BlinkMacSystemFont,sans-serif;
  --f-sans:"Pretendard Variable","Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --r-2:10px;
  --r-3:14px;
  --r-4:18px;
  --r-pill:999px;
  --shadow:0 18px 50px rgba(15,12,8,.08), 0 0 0 1px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0a0a0c;
    --surface:#131316;
    --surface-soft:#18181b;
    --ink:#f4f4f5;
    --text:#ededec;
    --text-mute:#a8a5a0;
    --text-faint:#6f6c66;
    --border:#2a2a2e;
    --border-2:#3a3a3f;
    --brand-soft:#2a0e18;
    --shadow:0 18px 50px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.04);
  }
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  min-height:100vh;
  font-family:var(--f-sans);
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button, input { font:inherit; color:inherit; }
button { cursor:pointer; border:0; }
.shell {
  width:min(1180px, calc(100% - 32px));
  margin:0 auto;
  padding:32px 0 56px;
}
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
.brand {
  display:flex;
  align-items:center;
  gap:10px;
  font-family:var(--f-display);
  font-weight:800;
}
.mark {
  width:28px;
  height:28px;
  display:grid;
  place-items:center;
  border-radius:8px;
  background:var(--brand);
  color:white;
}
.top-actions {
  display:flex;
  flex-wrap:wrap;
  justify-content:flex-end;
  gap:8px;
}
.hero {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-4);
  box-shadow:var(--shadow);
  padding:28px;
  margin-bottom:18px;
}
.eyebrow {
  font-family:var(--f-mono);
  font-size:11px;
  font-weight:700;
  letter-spacing:.12em;
  color:var(--brand);
  text-transform:uppercase;
}
h1 {
  margin-top:10px;
  font-family:var(--f-display);
  font-size:36px;
  line-height:1.08;
  letter-spacing:-.04em;
  color:var(--ink);
}
.hero p {
  margin-top:12px;
  max-width:680px;
  font-size:14px;
  color:var(--text-mute);
}
.btn {
  min-height:42px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 15px;
  border-radius:var(--r-2);
  background:var(--surface);
  border:1px solid var(--border);
  font-weight:800;
  font-size:13px;
}
.btn.primary {
  background:var(--ink);
  border-color:var(--ink);
  color:var(--surface);
}
.btn.accent {
  background:var(--brand);
  border-color:var(--brand);
  color:white;
}
.btn:hover { border-color:var(--border-2); }
.kpis {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
  margin:18px 0;
}
.kpi, .panel, .login-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-4);
  box-shadow:0 1px 2px rgba(15,12,8,.03);
}
.kpi { padding:18px; }
.kpi-label {
  font-family:var(--f-mono);
  font-size:10px;
  font-weight:700;
  color:var(--text-faint);
  letter-spacing:.08em;
  text-transform:uppercase;
}
.kpi-value {
  margin-top:8px;
  font-family:var(--f-mono);
  font-size:26px;
  font-weight:800;
  color:var(--ink);
}
.kpi-note {
  margin-top:2px;
  font-size:12px;
  color:var(--text-mute);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.grid {
  display:grid;
  grid-template-columns:360px 1fr;
  gap:14px;
  align-items:start;
}
.panel { overflow:hidden; }
.panel-head {
  min-height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:16px 18px;
  border-bottom:1px solid var(--border);
}
.panel-title {
  font-family:var(--f-display);
  font-size:15px;
  font-weight:900;
  letter-spacing:-.02em;
}
.tag {
  font-family:var(--f-mono);
  font-size:10px;
  font-weight:700;
  color:var(--text-faint);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.panel-body { padding:18px; }
.record-list {
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:680px;
  overflow:auto;
}
.record-btn {
  width:100%;
  text-align:left;
  padding:14px;
  border:1px solid var(--border);
  border-radius:var(--r-3);
  background:var(--surface-soft);
}
.record-btn.active {
  border-color:rgba(255,46,99,.45);
  background:var(--brand-soft);
}
.record-name {
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-weight:900;
}
.record-meta {
  margin-top:6px;
  font-size:12px;
  color:var(--text-mute);
}
.customer-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.field {
  min-width:0;
  background:var(--surface-soft);
  border:1px solid var(--border);
  border-radius:var(--r-2);
  padding:13px;
}
.field.wide { grid-column:1 / -1; }
.field-label {
  font-family:var(--f-mono);
  font-size:10px;
  font-weight:700;
  color:var(--text-faint);
  letter-spacing:.06em;
  text-transform:uppercase;
}
.field-value {
  margin-top:7px;
  font-size:13px;
  font-weight:700;
  overflow-wrap:anywhere;
}
.score-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.bars {
  display:flex;
  flex-direction:column;
  gap:13px;
}
.bar-row {
  display:grid;
  grid-template-columns:86px 1fr 36px;
  gap:10px;
  align-items:center;
}
.bar-name {
  font-size:12px;
  font-weight:800;
}
.track {
  height:10px;
  border-radius:var(--r-pill);
  background:var(--surface-soft);
  border:1px solid var(--border);
  overflow:hidden;
}
.fill {
  height:100%;
  width:var(--w);
  border-radius:var(--r-pill);
  background:linear-gradient(90deg, var(--brand), #ff7aa3);
}
.bar-num {
  font-family:var(--f-mono);
  font-weight:900;
  text-align:right;
}
.radar {
  width:100%;
  max-width:320px;
  margin:0 auto;
}
.radar svg { width:100%; height:auto; overflow:visible; }
.summary-box {
  margin-top:14px;
  padding:16px;
  border-radius:var(--r-3);
  background:var(--surface-soft);
  border:1px solid var(--border);
}
.summary-box b {
  display:block;
  font-family:var(--f-display);
  font-size:18px;
  letter-spacing:-.03em;
}
.summary-box p {
  margin-top:8px;
  font-size:13px;
  color:var(--text-mute);
}
.table-wrap {
  overflow:auto;
  max-height:520px;
}
table {
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}
th, td {
  padding:12px 10px;
  border-bottom:1px solid var(--border);
  text-align:left;
  vertical-align:top;
  font-size:12px;
}
th {
  position:sticky;
  top:0;
  z-index:1;
  background:var(--surface);
  font-family:var(--f-mono);
  font-size:10px;
  color:var(--text-faint);
  letter-spacing:.08em;
  text-transform:uppercase;
}
td:first-child {
  font-family:var(--f-mono);
  color:var(--text-faint);
  white-space:nowrap;
}
.empty {
  padding:34px 18px;
  text-align:center;
  color:var(--text-mute);
}
.empty b {
  display:block;
  color:var(--text);
  margin-bottom:6px;
}
.login-wrap {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}
.login-card {
  width:min(420px, 100%);
  padding:28px;
  box-shadow:var(--shadow);
}
.login-card h1 {
  font-size:28px;
}
.login-card p {
  margin-top:10px;
  color:var(--text-mute);
  font-size:13px;
}
.code-input {
  width:100%;
  height:48px;
  margin-top:18px;
  padding:0 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-2);
  background:var(--surface-soft);
  font-family:var(--f-mono);
  font-weight:700;
}
.code-input:focus {
  outline:0;
  border-color:var(--ink);
}
.login-actions {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.error {
  min-height:20px;
  margin-top:10px;
  font-size:12px;
  color:var(--brand-deep);
  font-weight:700;
}
.hidden { display:none !important; }
@media print {
  .topbar, .top-actions, .record-list, .login-wrap { display:none !important; }
  body { background:#fff; }
  .shell { width:100%; padding:0; }
  .panel, .hero, .kpi { box-shadow:none; }
}
@media (max-width:900px) {
  .kpis { grid-template-columns:repeat(2, 1fr); }
  .grid, .score-grid { grid-template-columns:1fr; }
}
@media (max-width:560px) {
  .shell { width:calc(100% - 20px); padding-top:18px; }
  .topbar { align-items:flex-start; }
  h1 { font-size:28px; }
  .hero { padding:20px; }
  .kpis, .customer-grid, .login-actions { grid-template-columns:1fr; }
  .bar-row { grid-template-columns:76px 1fr 34px; }
}
</style>
</head>
<body>
<div class="login-wrap" id="login">
  <form class="login-card" id="loginForm">
    <div class="eyebrow">Restricted Dashboard</div>
    <h1>관리자 접근</h1>
    <p>진단 완료 데이터와 엑셀 내보내기는 접근 코드를 가진 사용자만 확인할 수 있습니다.</p>
    <input class="code-input" id="accessCode" type="password" autocomplete="current-password" placeholder="접근 코드" />
    <div class="login-actions">
      <button class="btn primary" type="submit">입장</button>
      <button class="btn" type="button" onclick="location.href='index.html'">진단 페이지</button>
    </div>
    <div class="error" id="loginError"></div>
  </form>
</div>

<main class="shell hidden" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="mark">A</div>
      <span>CAD Diagnosis Admin</span>
    </div>
    <div class="top-actions">
      <button class="btn accent" id="exportBtn">엑셀 내보내기</button>
      <button class="btn" onclick="window.print()">인쇄</button>
      <button class="btn" id="lockBtn">잠금</button>
      <button class="btn" onclick="location.href='index.html'">진단 페이지</button>
    </div>
  </header>

  <section class="hero">
    <div class="eyebrow">Completed Data Dashboard</div>
    <h1>진단 완료 데이터 대시보드</h1>
    <p>완료된 진단 결과를 고객정보, 상세 응답, 점수 시각화와 함께 확인하고 Excel 파일로 내보낼 수 있습니다.</p>
  </section>

  <section class="kpis" id="kpis"></section>

  <section class="grid">
    <aside class="panel">
      <div class="panel-head">
        <div class="panel-title">완료 데이터 목록</div>
        <div class="tag" id="countTag">0 Records</div>
      </div>
      <div class="panel-body">
        <div class="record-list" id="recordList"></div>
      </div>
    </aside>

    <div>
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">고객 상세 정보</div>
          <div class="tag" id="recordId">-</div>
        </div>
        <div class="panel-body">
          <div class="customer-grid" id="customerGrid"></div>
        </div>
      </section>

      <section class="panel" style="margin-top:14px">
        <div class="panel-head">
          <div class="panel-title">점수 시각화</div>
          <div class="tag" id="typeTag">-</div>
        </div>
        <div class="panel-body">
          <div class="score-grid">
            <div class="radar" id="radar"></div>
            <div>
              <div class="bars" id="scoreBars"></div>
              <div class="summary-box" id="summaryBox"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" style="margin-top:14px">
        <div class="panel-head">
          <div class="panel-title">전체 응답 상세</div>
          <div class="tag" id="answerTag">-</div>
        </div>
        <div class="panel-body">
          <div id="answerTable"></div>
        </div>
      </section>
    </div>
  </section>
</main>

<script>
const DASHBOARD_PASSCODE = 'CAD2026';
const AUTH_KEY = 'cadDiagnosis.dashboard.authed';
const STORAGE_KEY = 'cadDiagnosis.completed.v1';
const DIM_SHORT = {
  auto: { kor:'업무 자동화', en:'AUTOMATION', color:'var(--blue)' },
  exp:  { kor:'설계 전문성', en:'EXPERTISE', color:'var(--violet)' },
  col:  { kor:'협업성', en:'COLLAB', color:'var(--cyan)' },
  ext:  { kor:'확장성', en:'EXT', color:'var(--orange)' },
  mob:  { kor:'이동성', en:'MOBILITY', color:'var(--green)' }
};
const ORDER = ['auto','exp','ext','mob','col'];
let records = [];
let selectedId = null;

const $ = sel => document.querySelector(sel);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function loadRecords() {
  try {
    const rows = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return Array.isArray(rows) ? rows : [];
  } catch (err) {
    return [];
  }
}
function isAuthed() {
  return sessionStorage.getItem(AUTH_KEY) === 'yes';
}
function showApp() {
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  render();
}
function showLogin() {
  $('#app').classList.add('hidden');
  $('#login').classList.remove('hidden');
  $('#accessCode').focus();
}

$('#loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const code = $('#accessCode').value.trim();
  if (code === DASHBOARD_PASSCODE) {
    sessionStorage.setItem(AUTH_KEY, 'yes');
    $('#accessCode').value = '';
    $('#loginError').textContent = '';
    showApp();
  } else {
    $('#loginError').textContent = '접근 코드가 올바르지 않습니다.';
  }
});
$('#lockBtn').addEventListener('click', () => {
  sessionStorage.removeItem(AUTH_KEY);
  showLogin();
});
$('#exportBtn').addEventListener('click', exportExcel);

function render() {
  records = loadRecords();
  if (!selectedId && records[0]) selectedId = records[0].id;
  const selected = records.find(row => row.id === selectedId) || records[0];
  if (selected) selectedId = selected.id;

  renderKpis(selected);
  renderRecordList();
  renderDetail(selected);
}

function renderKpis(selected) {
  const avgAll = records.length
    ? Math.round(records.reduce((sum, row) => sum + (row.totalScore || 0), 0) / records.length)
    : 0;
  const topType = getMostCommon(records.map(row => row.type?.name).filter(Boolean));
  const latest = records[0]?.completedAt || '-';
  $('#kpis').innerHTML = [
    ['Completed', records.length, '누적 진단'],
    ['Average', avgAll, '전체 평균 점수'],
    ['Latest', latest, '최근 완료'],
    ['Top Type', topType || '-', '가장 많은 유형']
  ].map(([label, value, note]) => `
    <div class="kpi">
      <div class="kpi-label">${escapeHtml(label)}</div>
      <div class="kpi-value">${escapeHtml(value)}</div>
      <div class="kpi-note">${escapeHtml(note)}</div>
    </div>
  `).join('');
}

function getMostCommon(values) {
  const counts = new Map();
  values.forEach(v => counts.set(v, (counts.get(v) || 0) + 1));
  return [...counts.entries()].sort((a,b) => b[1] - a[1])[0]?.[0];
}

function renderRecordList() {
  $('#countTag').textContent = `${records.length} Records`;
  if (!records.length) {
    $('#recordList').innerHTML = '<div class="empty"><b>완료된 진단 데이터가 없습니다</b>진단을 완료하면 이곳에 표시됩니다.</div>';
    return;
  }
  $('#recordList').innerHTML = records.map(row => `
    <button class="record-btn ${row.id === selectedId ? 'active' : ''}" type="button" data-id="${escapeHtml(row.id)}">
      <div class="record-name">
        <span>${escapeHtml(row.userName || '사용자')}</span>
        <span>${row.totalScore || 0}</span>
      </div>
      <div class="record-meta">${escapeHtml(row.completedAt || '-')} · ${escapeHtml(row.type?.name || '-')}형</div>
    </button>
  `).join('');
  document.querySelectorAll('.record-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedId = btn.dataset.id;
      render();
      window.scrollTo({ top:0, behavior:'smooth' });
    });
  });
}

function renderDetail(record) {
  if (!record) {
    $('#recordId').textContent = '-';
    $('#typeTag').textContent = '-';
    $('#answerTag').textContent = '-';
    $('#customerGrid').innerHTML = '<div class="empty"><b>선택된 데이터가 없습니다</b></div>';
    $('#scoreBars').innerHTML = '';
    $('#radar').innerHTML = '';
    $('#summaryBox').innerHTML = '';
    $('#answerTable').innerHTML = '';
    return;
  }
  $('#recordId').textContent = record.id || '-';
  $('#typeTag').textContent = `${record.type?.name || '-'}형`;
  $('#answerTag').textContent = `${record.answers?.length || 0} Questions`;
  renderCustomer(record);
  renderScores(record);
  renderAnswers(record.answers || []);
}

function renderCustomer(record) {
  const c = record.customer || {};
  const fields = [
    ['고객명', record.userName],
    ['완료일시', record.completedAt],
    ['업종', c.industry],
    ['직무', c.role],
    ['설계 인원', c.teamSize],
    ['사용 CAD', c.cadType],
    ['AI 자동화 관심분야', c.aiTarget, 'wide'],
    ['추가 희망 서비스', c.extraSvc, 'wide'],
    ['추천 솔루션', (record.recommendations || []).join(', '), 'wide']
  ];
  $('#customerGrid').innerHTML = fields.map(([label, value, wide]) => `
    <div class="field ${wide || ''}">
      <div class="field-label">${escapeHtml(label)}</div>
      <div class="field-value">${escapeHtml(value || '-')}</div>
    </div>
  `).join('');
}

function renderScores(record) {
  const scores = record.scores || {};
  $('#scoreBars').innerHTML = ORDER.map(k => {
    const s = scores[k] || 0;
    return `
      <div class="bar-row">
        <div class="bar-name">${DIM_SHORT[k].kor}</div>
        <div class="track"><div class="fill" style="--w:${s}%; background:${DIM_SHORT[k].color}"></div></div>
        <div class="bar-num">${s}</div>
      </div>
    `;
  }).join('');
  $('#radar').innerHTML = renderRadar(scores);
  $('#summaryBox').innerHTML = `
    <b>${escapeHtml(record.type?.name || '-')}형</b>
    <p>${escapeHtml(record.type?.quote || '진단 결과 요약 정보가 없습니다.')}</p>
  `;
}

function renderRadar(scores) {
  const dims = ORDER;
  const W = 320, H = 300, cx = W / 2, cy = H / 2, R = 92, N = dims.length;
  const ang = i => (Math.PI * 2 * i / N) - Math.PI / 2;
  const points = vals => vals.map((v, i) => {
    const r = (v / 100) * R;
    return `${cx + Math.cos(ang(i)) * r},${cy + Math.sin(ang(i)) * r}`;
  }).join(' ');
  const grid = [.25,.5,.75,1].map(scale => {
    const pts = dims.map((_, i) => `${cx + Math.cos(ang(i))*R*scale},${cy + Math.sin(ang(i))*R*scale}`).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--border-2)" stroke-dasharray="2 4"/>`;
  }).join('');
  const axes = dims.map((k, i) => {
    const x = cx + Math.cos(ang(i)) * R;
    const y = cy + Math.sin(ang(i)) * R;
    const lx = cx + Math.cos(ang(i)) * (R + 24);
    const ly = cy + Math.sin(ang(i)) * (R + 24);
    return `
      <line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border-2)"/>
      <text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="700" fill="var(--text)">${DIM_SHORT[k].kor}</text>
    `;
  }).join('');
  const vals = dims.map(k => scores[k] || 0);
  return `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="진단 점수 레이더 차트">
      ${grid}
      ${axes}
      <polygon points="${points(vals)}" fill="rgba(255,46,99,.22)" stroke="var(--brand)" stroke-width="2"/>
      ${vals.map((v, i) => {
        const r = (v / 100) * R;
        const x = cx + Math.cos(ang(i)) * r;
        const y = cy + Math.sin(ang(i)) * r;
        return `<circle cx="${x}" cy="${y}" r="4" fill="var(--surface)" stroke="var(--brand)" stroke-width="2"/>`;
      }).join('')}
    </svg>
  `;
}

function renderAnswers(rows) {
  if (!rows.length) {
    $('#answerTable').innerHTML = '<div class="empty"><b>응답 데이터가 없습니다</b></div>';
    return;
  }
  $('#answerTable').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>No</th><th>분류</th><th>질문</th><th>응답</th></tr></thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td>${pad(row.no || 0)}</td>
              <td>${escapeHtml(row.category || '-')}</td>
              <td>${escapeHtml(row.question || '-')}</td>
              <td>${escapeHtml(row.answer || '-')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function exportExcel() {
  if (!records.length) {
    alert('내보낼 진단 데이터가 없습니다.');
    return;
  }
  const scoreHeaders = ['업무 자동화','설계 전문성','협업성','확장성','이동성'];
  const rows = records.map(record => `
    <tr>
      <td>${escapeHtml(record.completedAt)}</td>
      <td>${escapeHtml(record.userName)}</td>
      <td>${escapeHtml(record.customer?.industry)}</td>
      <td>${escapeHtml(record.customer?.role)}</td>
      <td>${escapeHtml(record.customer?.teamSize)}</td>
      <td>${escapeHtml(record.customer?.cadType)}</td>
      <td>${escapeHtml(record.type?.name)}형</td>
      <td>${record.totalScore || 0}</td>
      <td>${record.scores?.auto || 0}</td>
      <td>${record.scores?.exp || 0}</td>
      <td>${record.scores?.col || 0}</td>
      <td>${record.scores?.ext || 0}</td>
      <td>${record.scores?.mob || 0}</td>
      <td>${escapeHtml((record.recommendations || []).join(', '))}</td>
      <td>${escapeHtml(record.customer?.aiTarget)}</td>
      <td>${escapeHtml(record.customer?.extraSvc)}</td>
    </tr>
  `).join('');
  const html = `
    <html><head><meta charset="UTF-8"></head><body>
      <table border="1">
        <thead>
          <tr>
            <th>완료일시</th><th>고객명</th><th>업종</th><th>직무</th><th>설계 인원</th><th>사용 CAD</th>
            <th>진단유형</th><th>평균점수</th>${scoreHeaders.map(h => `<th>${h}</th>`).join('')}
            <th>추천 솔루션</th><th>AI 자동화 관심분야</th><th>추가 희망 서비스</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </body></html>
  `;
  const blob = new Blob(['\ufeff' + html], { type:'application/vnd.ms-excel;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cad-diagnosis-dashboard-${new Date().toISOString().slice(0,10)}.xls`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
