<style>
/* ============================================================
   1.  DESIGN TOKENS
   ============================================================ */
:root {
  /* — Neutrals (warm gray) ————————————————————————— */
  --n-0:   #ffffff;
  --n-25:  #fdfcfa;
  --n-50:  #faf9f6;
  --n-100: #f5f3ef;
  --n-150: #eeece7;
  --n-200: #e2dfd9;
  --n-300: #cdc9c2;
  --n-400: #9c9892;
  --n-500: #6f6c66;
  --n-600: #4d4a45;
  --n-700: #2e2c29;
  --n-800: #19181c;
  --n-900: #0a0a09;

  /* — Brand ——————————————————————————————————————— */
  --brand:        #ff2e63;
  --brand-soft:   #ffe8ee;
  --brand-deep:   #c91144;
  --brand-ink:    #4d0a1d;

  /* — Surfaces ——————————————————————————————————— */
  --bg:           #f4f1ec;
  --bg-deco:      rgba(0,0,0,.025);
  --surface:      #ffffff;
  --surface-soft: #faf9f6;
  --surface-elev: #ffffff;
  --ink:          #0a0a0a;
  --text:         #181816;
  --text-mute:    #6f6c66;
  --text-faint:   #9c9892;
  --border:       #eeece7;
  --border-2:     #e2dfd9;
  --hairline:     rgba(0,0,0,.06);

  /* — Category palette ——————————————————————————— */
  --cat-info:     #57534e;
  --cat-auto:     #2563eb;     /* 업무자동화 */
  --cat-expert:   #7c3aed;     /* 설계전문성 */
  --cat-collab:   #0891b2;     /* 협업 */
  --cat-ext:      #c2410c;     /* 확장성 */
  --cat-mob:      #059669;     /* 이동성 */
  --cat-fb:       #db2777;     /* 사용자의견 */

  /* — Spacing scale ————————————————————————————— */
  --sp-1:  4px;  --sp-2:  8px;  --sp-3: 12px;  --sp-4: 16px;
  --sp-5: 20px;  --sp-6: 24px;  --sp-8: 32px;  --sp-10: 40px;
  --sp-12: 48px; --sp-16: 64px; --sp-20: 80px;

  /* — Radius ——————————————————————————————————— */
  --r-1: 6px;  --r-2: 10px;  --r-3: 14px;  --r-4: 18px;  --r-5: 24px;
  --r-pill: 999px;

  /* — Shadow (layered) ————————————————————————— */
  --sh-line:  0 0 0 1px var(--hairline);
  --sh-sm:    0 1px 2px rgba(15,12,8,.04), 0 2px 6px rgba(15,12,8,.04), 0 0 0 1px rgba(0,0,0,.03);
  --sh-md:    0 2px 4px rgba(15,12,8,.04), 0 12px 24px rgba(15,12,8,.06), 0 0 0 1px rgba(0,0,0,.03);
  --sh-lg:    0 8px 20px rgba(15,12,8,.06), 0 32px 64px rgba(15,12,8,.10), 0 0 0 1px rgba(0,0,0,.04);
  --sh-glow:  0 6px 16px rgba(255,46,99,.18), 0 12px 32px rgba(255,46,99,.18);

  /* — Motion ——————————————————————————————————— */
  --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --d-1: 150ms; --d-2: 250ms; --d-3: 400ms; --d-4: 600ms;

  /* — Typography ——————————————————————————————— */
  --f-display: "Inter", "Pretendard Variable", -apple-system, BlinkMacSystemFont, sans-serif;
  --f-sans:    "Pretendard Variable", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --f-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #0a0a0c;
    --bg-deco:      rgba(255,255,255,.025);
    --surface:      #131316;
    --surface-soft: #18181b;
    --surface-elev: #1c1c20;
    --ink:          #f4f4f5;
    --text:         #ededec;
    --text-mute:    #a8a5a0;
    --text-faint:   #6f6c66;
    --border:       #2a2a2e;
    --border-2:     #3a3a3f;
    --hairline:     rgba(255,255,255,.06);
    --brand-soft:   #2a0e18;
    --sh-sm:    0 1px 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04);
    --sh-md:    0 2px 4px rgba(0,0,0,.4), 0 12px 24px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
    --sh-lg:    0 8px 20px rgba(0,0,0,.5), 0 32px 64px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
  }
}

/* ============================================================
   2.  BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; text-rendering: optimizeLegibility; }
body {
  font-family: var(--f-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-feature-settings: "cv11","ss01","ss03","ss05";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* — Ambient background pattern (desktop) ——————————— */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, var(--bg-deco) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse 90% 60% at 50% 30%, #000 0%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 90% 60% at 50% 30%, #000 0%, transparent 80%);
}

button, input, textarea {
  font-family: inherit;
  color: inherit;
}
button { cursor: pointer; border: none; background: none; }
em { font-style: normal; }
.mono { font-family: var(--f-mono); font-variant-numeric: tabular-nums; }

/* ============================================================
   3.  APP LAYOUT
   ============================================================ */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  background: var(--surface);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
@media (min-width: 768px) {
  body { padding: 32px 0; }
  .app {
    border-radius: var(--r-5);
    min-height: calc(100vh - 64px);
    box-shadow: var(--sh-lg);
    overflow: hidden;
  }
}

/* ============================================================
   4.  TOP BAR
   ============================================================ */
.top {
  padding: var(--sp-5) var(--sp-6) var(--sp-3);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 30;
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(8px);
  -webkit-backdrop-filter: saturate(180%) blur(8px);
}
.top-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-3);
}
.brand {
  display: flex; align-items: center; gap: var(--sp-2);
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.02em;
  color: var(--text);
}
.brand-mark {
  width: 22px; height: 22px;
  background: var(--ink);
  color: var(--surface);
  border-radius: var(--r-1);
  display: grid; place-items: center;
  font-weight: 800;
  font-size: 11px;
}
.brand-mark.brand-mark-accent { background: var(--brand); color: #fff; }
.brand-text { letter-spacing: -.01em; }
.brand-text em { color: var(--brand); font-style: normal; font-weight: 800; }

.step-counter {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-mute);
  letter-spacing: 0;
}
.step-counter b { color: var(--text); font-weight: 700; }

/* progress with milestones */
.progress {
  position: relative;
  height: 5px;
  background: var(--n-150);
  border-radius: var(--r-pill);
  overflow: visible;
}
@media (prefers-color-scheme: dark) { .progress { background: var(--border); } }
.progress-fill {
  position: absolute; inset: 0 auto 0 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--brand) 0%, #ff5e8a 100%);
  border-radius: var(--r-pill);
  transition: width var(--d-3) var(--ease-expo);
  box-shadow: 0 0 12px rgba(255,46,99,.4);
}
.progress-milestones {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1px;
  pointer-events: none;
}
.progress-milestones span {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,.7);
  opacity: 0;
  transition: opacity var(--d-2);
}
.progress-milestones span.passed { opacity: 1; }

/* ============================================================
   5.  BODY (main scroll area)
   ============================================================ */
main.body {
  flex: 1;
  padding: var(--sp-8) var(--sp-6) var(--sp-20);
  overflow-y: auto;
}
.slide { animation: fade-up var(--d-3) var(--ease-expo); }
@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   6.  INTRO
   ============================================================ */
.intro { padding: var(--sp-3) 0 var(--sp-4); }

.intro-tag {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 6px 14px 6px 12px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-mute);
  letter-spacing: 0;
}
.intro-tag .tag-dot {
  width: 6px; height: 6px;
  background: var(--brand);
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(255,46,99,.18);
  animation: pulse 2s var(--ease-expo) infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(255,46,99,.18); }
  50%      { box-shadow: 0 0 0 6px rgba(255,46,99,0); }
}

.intro-headline {
  margin-top: var(--sp-5);
  font-family: var(--f-display);
  font-size: 38px;
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.035em;
  color: var(--ink);
}
.intro-headline em {
  background: linear-gradient(90deg, var(--brand) 0%, #ff7aa3 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: normal;
}
.intro-sub {
  margin-top: var(--sp-4);
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--text-mute);
  letter-spacing: -.005em;
}

.intro-illu {
  margin: var(--sp-8) calc(var(--sp-6) * -1) var(--sp-8);
  padding: var(--sp-6) var(--sp-6) var(--sp-4);
  position: relative;
  background:
    linear-gradient(180deg, var(--surface-soft) 0%, var(--surface) 100%);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.intro-illu svg { width: 100%; height: auto; display: block; }

.trust-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-2);
  margin: var(--sp-6) 0;
}
.trust-card {
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-3);
  padding: var(--sp-4) var(--sp-3);
  text-align: center;
  transition: all var(--d-2) var(--ease-expo);
}
.trust-card:hover {
  border-color: var(--border-2);
  transform: translateY(-2px);
  box-shadow: var(--sh-sm);
}
.trust-num {
  font-family: var(--f-display);
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -.04em;
  color: var(--ink);
  line-height: 1.1;
}
.trust-num span {
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-faint);
  margin-left: 2px;
}
.trust-lbl {
  margin-top: 2px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-mute);
  letter-spacing: -.005em;
}

.name-input-wrap { position: relative; margin-top: var(--sp-4); }
.name-input {
  width: 100%;
  padding: 16px 18px;
  background: var(--surface-soft);
  border: 1.5px solid var(--border);
  border-radius: var(--r-3);
  font-size: 14.5px;
  font-weight: 500;
  color: var(--text);
  transition: all var(--d-2) var(--ease-expo);
  text-align: left;
}
.name-input::placeholder { color: var(--text-faint); }
.name-input:focus {
  outline: none;
  border-color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 4px rgba(0,0,0,.04);
}

.btn-cta {
  display: flex; align-items: center; justify-content: center;
  gap: var(--sp-2);
  width: 100%;
  margin-top: var(--sp-3);
  padding: 18px 24px;
  background: var(--ink);
  color: var(--n-0);
  border-radius: var(--r-3);
  font-family: var(--f-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.01em;
  position: relative;
  overflow: hidden;
  transition: all var(--d-2) var(--ease-expo);
}
.btn-cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.18) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform var(--d-4) var(--ease-expo);
}
.btn-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,.2); }
.btn-cta:hover::before { transform: translateX(100%); }
.btn-cta svg { transition: transform var(--d-2) var(--ease-expo); }
.btn-cta:hover svg { transform: translateX(3px); }

.intro-foot {
  margin-top: var(--sp-5);
  text-align: center;
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: -.005em;
  line-height: 1.6;
}

/* ============================================================
   7.  QUESTION
   ============================================================ */
.q-meta {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-family: var(--f-mono);
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-faint);
  letter-spacing: .03em;
  text-transform: uppercase;
}
.q-meta .num { color: var(--text); font-weight: 600; }
.q-meta .sep { opacity: .4; }
.q-meta .cat { color: var(--cat-color, var(--text-mute)); font-weight: 600; }

.q-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  margin-top: var(--sp-3);
  padding: 7px 14px 7px 10px;
  background: var(--cat-bg, var(--surface-soft));
  border: 1px solid var(--cat-border, var(--border));
  border-radius: var(--r-pill);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--cat-color, var(--text));
  letter-spacing: -.01em;
}
.q-badge svg { width: 13px; height: 13px; flex-shrink: 0; }

.q-title {
  margin-top: var(--sp-5);
  font-family: var(--f-display);
  font-weight: 800;
  font-size: 22px;
  line-height: 1.35;
  letter-spacing: -.032em;
  color: var(--ink);
}
.q-title em { color: var(--brand); font-style: normal; }
.q-sub {
  margin-top: var(--sp-2);
  font-size: 13px;
  color: var(--text-mute);
  letter-spacing: -.005em;
}

.q-image {
  margin: var(--sp-5) 0;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: var(--r-3);
  background:
    repeating-linear-gradient(45deg, #1a1d24 0px, #1a1d24 12px, #1f2229 12px, #1f2229 24px);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  display: grid; place-items: center;
}
.q-image::after {
  content: '예시 도면';
  font-family: var(--f-mono);
  font-size: 11px;
  color: rgba(255,255,255,.4);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* — Options ————————————————————————————————————— */
.options { margin-top: var(--sp-6); display: flex; flex-direction: column; gap: var(--sp-2); }
.options.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-2); }

.opt {
  position: relative;
  width: 100%;
  padding: 17px 18px 17px 22px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r-3);
  text-align: left;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -.01em;
  line-height: 1.45;
  transition: all var(--d-2) var(--ease-expo);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  overflow: hidden;
}
.opt::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--brand);
  transform: scaleY(0);
  transform-origin: center;
  transition: transform var(--d-2) var(--ease-expo);
}
.opt-check {
  width: 20px; height: 20px;
  border: 1.5px solid var(--border-2);
  border-radius: 6px;
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: all var(--d-2) var(--ease-expo);
  background: var(--surface);
}
.opt-check svg {
  width: 12px; height: 12px;
  stroke-dasharray: 16;
  stroke-dashoffset: 16;
  transition: stroke-dashoffset var(--d-3) var(--ease-expo) .05s;
}
.opt-body { flex: 1; min-width: 0; }
.opt-label { font-weight: 500; }
.opt-desc {
  display: block;
  margin-top: 4px;
  font-size: 11.5px;
  font-weight: 400;
  color: var(--text-mute);
  line-height: 1.55;
}
.opt:hover {
  border-color: var(--border-2);
  transform: translateY(-1px);
  box-shadow: var(--sh-sm);
}
.opt.selected {
  background: var(--brand-soft);
  border-color: var(--brand);
  color: var(--brand-deep);
}
.opt.selected::before { transform: scaleY(1); }
.opt.selected .opt-label { font-weight: 700; }
.opt.selected .opt-check {
  background: var(--brand);
  border-color: var(--brand);
}
.opt.selected .opt-check svg { stroke-dashoffset: 0; }
.opt.selected .opt-desc { color: var(--brand-deep); opacity: .8; }
@media (prefers-color-scheme: dark) {
  .opt.selected { background: rgba(255,46,99,.12); color: #ffaec1; }
  .opt.selected .opt-desc { color: #ff8aa8; }
}

textarea.opt-text {
  margin-top: var(--sp-6);
  width: 100%;
  min-height: 140px;
  padding: 18px;
  background: var(--surface-soft);
  border: 1.5px solid var(--border);
  border-radius: var(--r-3);
  resize: vertical;
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  transition: all var(--d-2) var(--ease-expo);
}
textarea.opt-text::placeholder { color: var(--text-faint); }
textarea.opt-text:focus {
  outline: none;
  border-color: var(--ink);
  background: var(--surface);
  box-shadow: 0 0 0 4px rgba(0,0,0,.04);
}

/* ============================================================
   8.  NAV BAR (footer)
   ============================================================ */
.nav-bar {
  position: sticky;
  bottom: 0;
  background: linear-gradient(to top, var(--surface) 75%, rgba(0,0,0,0));
  padding: var(--sp-4) var(--sp-6) var(--sp-6);
  display: flex;
  gap: var(--sp-2);
  z-index: 20;
}
.btn {
  flex: 1;
  padding: 16px 20px;
  border-radius: var(--r-3);
  font-family: var(--f-display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.01em;
  transition: all var(--d-2) var(--ease-expo);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-2);
}
.btn svg { width: 14px; height: 14px; }
.btn-prev {
  background: var(--surface);
  color: var(--text-mute);
  border: 1.5px solid var(--border);
  flex: 0 0 38%;
}
.btn-prev:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--border-2);
}
.btn-prev:disabled { opacity: .35; cursor: not-allowed; }

.btn-next {
  background: var(--ink);
  color: var(--n-0);
  position: relative;
  overflow: hidden;
}
.btn-next::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.18) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform var(--d-4) var(--ease-expo);
}
.btn-next:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.18); }
.btn-next:hover:not(:disabled)::before { transform: translateX(100%); }
.btn-next:hover:not(:disabled) svg { transform: translateX(3px); }
.btn-next:disabled { background: var(--n-300); color: var(--text-faint); cursor: not-allowed; }
.btn-next svg { transition: transform var(--d-2) var(--ease-expo); }
@media (prefers-color-scheme: dark) {
  .btn-next:disabled { background: var(--border-2); color: var(--text-faint); }
}

/* ============================================================
   9.  RESULT - HERO
   ============================================================ */
.result { padding-bottom: var(--sp-8); }

.r-hero {
  position: relative;
  text-align: center;
  padding: var(--sp-6) 0 var(--sp-8);
  margin-bottom: var(--sp-8);
  border-bottom: 1px solid var(--border);
}
.r-hero-eyebrow {
  font-family: var(--f-mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.r-hero-eyebrow b { color: var(--text); font-weight: 600; }
.r-hero-name {
  margin-top: var(--sp-2);
  font-size: 14px;
  color: var(--text-mute);
  font-weight: 500;
}
.r-hero-name b { color: var(--ink); font-weight: 700; }

.r-hero-type {
  margin-top: var(--sp-5);
  font-family: var(--f-display);
  font-size: 44px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -.045em;
  color: var(--ink);
}
.r-hero-type em {
  background: linear-gradient(90deg, var(--brand) 0%, #ff7aa3 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: normal;
}
.r-hero-eng {
  margin-top: var(--sp-3);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  font-family: var(--f-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-mute);
  letter-spacing: 0;
}
.r-hero-eng::before {
  content: '';
  width: 5px; height: 5px;
  background: var(--brand);
  border-radius: 50%;
}

/* ============================================================
   10.  RESULT - SECTIONS
   ============================================================ */
.r-section { margin-bottom: var(--sp-8); }
.r-section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-4);
}
.r-section-title {
  font-family: var(--f-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-mute);
  display: flex; align-items: center; gap: var(--sp-2);
}
.r-section-title::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--brand);
}
.r-section-num {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--text-faint);
  font-weight: 500;
}

/* ============================================================
   11.  RADAR CHART
   ============================================================ */
.r-card {
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  position: relative;
}
.r-card-pad { padding: var(--sp-6); }
.r-card-pad-lg { padding: var(--sp-8) var(--sp-6); }

.radar-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--sp-5);
}
.radar-head-title {
  font-family: var(--f-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
}
.radar-head-tag {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: .04em;
  text-transform: uppercase;
}

.radar-wrap {
  width: 100%;
  aspect-ratio: 1 / 0.95;
  max-width: 420px;
  margin: 0 auto;
}
.radar-wrap svg { width: 100%; height: auto; display: block; overflow: visible; }
.radar-axis-line { stroke: var(--border-2); stroke-width: 1; }
.radar-grid-solid { fill: none; stroke: var(--border-2); stroke-width: 1; }
.radar-grid-dot   { fill: none; stroke: var(--border-2); stroke-width: .8; stroke-dasharray: 2 4; opacity: .8; }
.radar-data {
  fill: url(#radarGrad);
  stroke: var(--brand);
  stroke-width: 2;
  stroke-linejoin: round;
  filter: drop-shadow(0 4px 12px rgba(255,46,99,.25));
  animation: radar-in 800ms var(--ease-expo) both;
}
@keyframes radar-in {
  from { transform: scale(.6); transform-origin: center; opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.radar-vertex {
  fill: var(--surface);
  stroke: var(--brand);
  stroke-width: 2.5;
  transition: r var(--d-2) var(--ease-expo);
}
.radar-vertex:hover { r: 6; }
.radar-pill-bg {
  fill: var(--ink);
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.15));
}
.radar-pill-text {
  font-family: var(--f-mono);
  font-size: 10.5px;
  font-weight: 700;
  fill: var(--n-0);
}
.radar-axis-label {
  font-family: var(--f-display);
  font-size: 10.5px;
  font-weight: 600;
  fill: var(--text);
  letter-spacing: -.01em;
}
.radar-axis-label-en {
  font-family: var(--f-mono);
  font-size: 8.5px;
  font-weight: 500;
  fill: var(--text-faint);
  letter-spacing: .04em;
}
.radar-guide {
  font-family: var(--f-mono);
  font-size: 8.5px;
  fill: var(--text-faint);
  letter-spacing: .04em;
}

/* — radar legend ————————————————————————————— */
.radar-legend {
  display: flex; align-items: center; justify-content: center;
  gap: var(--sp-4);
  margin-top: var(--sp-3);
  padding-top: var(--sp-3);
  border-top: 1px dashed var(--border);
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.radar-legend-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 2px;
  background: var(--brand);
  margin-right: 6px;
  vertical-align: middle;
}

/* ============================================================
   12.  SCORE BARS
   ============================================================ */
.scores { display: flex; flex-direction: column; gap: var(--sp-4); }
.score-row {
  display: grid;
  grid-template-columns: 76px 1fr 38px;
  gap: var(--sp-3);
  align-items: center;
}
.score-label-wrap {
  display: flex; flex-direction: column; gap: 2px;
}
.score-label {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.score-label-en {
  font-family: var(--f-mono);
  font-size: 9px;
  color: var(--text-faint);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.score-bar {
  position: relative;
  height: 28px;
  display: flex; align-items: center;
}
.score-bar-track {
  position: relative;
  width: 100%;
  height: 8px;
  background: var(--n-150);
  border-radius: var(--r-pill);
  overflow: hidden;
}
@media (prefers-color-scheme: dark) { .score-bar-track { background: var(--border); } }
.score-bar-fill {
  position: absolute; inset: 0 auto 0 0;
  height: 100%;
  width: 0%;
  border-radius: var(--r-pill);
  background: linear-gradient(90deg, var(--brand) 0%, #ff7aa3 100%);
  transition: width 1200ms var(--ease-expo);
}
.score-bar-milestones {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0;
  pointer-events: none;
}
.score-bar-milestones span {
  width: 1px; height: 8px;
  background: rgba(255,255,255,.4);
}
.score-num {
  font-family: var(--f-mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  text-align: right;
  font-variant-numeric: tabular-nums;
  letter-spacing: -.02em;
}

.score-eval {
  margin-top: var(--sp-1);
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-mute);
  letter-spacing: -.005em;
  display: flex; align-items: center; gap: 4px;
}
.score-eval::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .6;
}
.eval-strategic { color: var(--brand); }
.eval-improve   { color: #d97706; }
.eval-strong    { color: #059669; }

/* ============================================================
   13.  SUMMARY (Diagnosis text)
   ============================================================ */
.summary {
  position: relative;
  padding: var(--sp-8) var(--sp-6);
}
.summary-quote-mark {
  position: absolute;
  top: 16px; left: 18px;
  font-family: var(--f-display);
  font-size: 80px;
  font-weight: 900;
  line-height: 1;
  color: var(--brand);
  opacity: .12;
  pointer-events: none;
}
.summary-emoji {
  font-size: 48px;
  text-align: center;
  margin-bottom: var(--sp-4);
}
.summary-eng {
  text-align: center;
  font-family: var(--f-display);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -.035em;
  color: var(--ink);
  line-height: 1.15;
}
.summary-eng em {
  background: linear-gradient(90deg, var(--brand) 0%, #ff7aa3 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  font-style: normal;
}
.summary-kor {
  text-align: center;
  margin-top: var(--sp-2);
  font-size: 13px;
  color: var(--text-mute);
  letter-spacing: -.005em;
}
.summary-quote {
  margin: var(--sp-6) 0;
  padding: var(--sp-5) var(--sp-5);
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--brand);
  border-radius: var(--r-2);
  font-family: var(--f-display);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.6;
  letter-spacing: -.02em;
  color: var(--text);
}
.summary-body {
  font-size: 13.5px;
  line-height: 1.85;
  color: var(--text);
  letter-spacing: -.005em;
}
.summary-body p + p { margin-top: var(--sp-3); }
.summary-body strong {
  color: var(--brand);
  font-weight: 700;
  background: linear-gradient(180deg, transparent 60%, rgba(255,46,99,.15) 60%);
  padding: 0 2px;
}
/* drop cap */
.summary-body .dropcap {
  float: left;
  font-family: var(--f-display);
  font-size: 44px;
  font-weight: 900;
  line-height: .9;
  color: var(--brand);
  margin: 4px 8px -2px 0;
  letter-spacing: -.04em;
}

/* ============================================================
   14.  RECOMMENDATIONS
   ============================================================ */
.reco-grid { display: flex; flex-direction: column; gap: var(--sp-4); }
.reco-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-4);
  overflow: hidden;
  position: relative;
  transition: all var(--d-3) var(--ease-expo);
}
.reco-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-md);
  border-color: var(--border-2);
}
.reco-header {
  padding: var(--sp-5);
  background: linear-gradient(135deg, var(--ink) 0%, #2a2a2e 100%);
  color: var(--n-0);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  position: relative;
  overflow: hidden;
}
.reco-header::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 90% 10%, rgba(255,46,99,.3) 0%, transparent 40%);
  pointer-events: none;
}
.reco-logo {
  width: 48px; height: 48px;
  background: var(--brand);
  border-radius: var(--r-2);
  display: grid; place-items: center;
  font-family: var(--f-display);
  font-weight: 900;
  font-size: 22px;
  color: #fff;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  box-shadow: 0 4px 12px rgba(255,46,99,.4);
}
.reco-title { position: relative; z-index: 1; }
.reco-name {
  font-family: var(--f-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.1;
}
.reco-tagline {
  margin-top: 4px;
  font-family: var(--f-mono);
  font-size: 10.5px;
  color: rgba(255,255,255,.6);
  letter-spacing: .03em;
  text-transform: uppercase;
}
.reco-body { padding: var(--sp-5); }
.reco-desc {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-mute);
  letter-spacing: -.005em;
  margin-bottom: var(--sp-4);
}
.reco-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: var(--sp-4);
}
.chip {
  display: inline-flex; align-items: center;
  padding: 5px 11px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-pill);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mute);
  letter-spacing: -.005em;
}
.chip.chip-accent { background: var(--brand-soft); border-color: rgba(255,46,99,.25); color: var(--brand); }
.reco-cta {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  padding: 10px 16px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  font-family: var(--f-display);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
  transition: all var(--d-2) var(--ease-expo);
}
.reco-cta:hover {
  background: var(--ink);
  color: var(--n-0);
  border-color: var(--ink);
}
.reco-cta:hover svg { transform: translateX(2px); }
.reco-cta svg { width: 12px; height: 12px; transition: transform var(--d-2) var(--ease-expo); }

/* ============================================================
   15.  ACTIONS (final buttons)
   ============================================================ */
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
  margin-top: var(--sp-8);
  padding-top: var(--sp-6);
  border-top: 1px solid var(--border);
}
.actions .btn { min-width: calc(50% - var(--sp-1)); }
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover {
  background: var(--surface-soft);
  border-color: var(--border-2);
}

/* ============================================================
   16.  TOAST
   ============================================================ */
.toast {
  position: fixed;
  left: 50%;
  bottom: 110px;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--n-0);
  padding: 12px 20px;
  border-radius: var(--r-pill);
  font-family: var(--f-display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -.01em;
  opacity: 0;
  pointer-events: none;
  transition: all var(--d-3) var(--ease-back);
  z-index: 100;
  box-shadow: 0 12px 32px rgba(0,0,0,.2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   17.  REVEAL ANIMATION
   ============================================================ */
.reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity var(--d-3) var(--ease-expo), transform var(--d-3) var(--ease-expo);
}
.reveal.in { opacity: 1; transform: none; }
.reveal[data-d="1"] { transition-delay: 80ms; }
.reveal[data-d="2"] { transition-delay: 160ms; }
.reveal[data-d="3"] { transition-delay: 240ms; }
.reveal[data-d="4"] { transition-delay: 320ms; }
.reveal[data-d="5"] { transition-delay: 400ms; }

/* ============================================================
   18.  PRINT
   ============================================================ */
@media print {
  body { background: #fff; padding: 0; }
  body::before { display: none; }
  .app { box-shadow: none; max-width: 100%; border-radius: 0; }
  .nav-bar, .actions, .toast { display: none !important; }
  .reco-card:hover { transform: none; box-shadow: none; }
  main.body { padding-bottom: var(--sp-6); }
}

/* ============================================================
   19.  RESPONSIVE
   ============================================================ */
@media (max-width: 380px) {
  .intro-headline { font-size: 32px; }
  .r-hero-type { font-size: 36px; }
  .summary-eng { font-size: 22px; }
  .q-title { font-size: 19px; }
  main.body { padding: var(--sp-6) var(--sp-5) var(--sp-20); }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ====== TOP ====== -->
  <header class="top" id="topBar" hidden>
    <div class="top-row">
      <div class="brand">
        <div class="brand-mark brand-mark-accent">A</div>
        <span class="brand-text">CAD <em>Diagnosis</em></span>
      </div>
      <div class="step-counter"><b id="stepCur">01</b> <span style="opacity:.4">/</span> <span id="stepTotal">21</span></div>
    </div>
    <div class="progress">
      <div class="progress-fill" id="progress"></div>
      <div class="progress-milestones" id="progressMilestones"></div>
    </div>
  </header>

  <!-- ====== BODY ====== -->
  <main class="body" id="content"></main>

  <!-- ====== NAV ====== -->
  <nav class="nav-bar" id="navBar" hidden>
    <button class="btn btn-prev" id="btnPrev" aria-label="이전">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 4 L6 8 L10 12"/></svg>
      이전
    </button>
    <button class="btn btn-next" id="btnNext" aria-label="다음">

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* — IntersectionObserver based reveal — */
let revealObs;
function setupReveal() {
  if (revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        revealObs.unobserve(e.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -8% 0px' });
  $$('.reveal').forEach(el => revealObs.observe(el));
}

   ========================================================= */
function renderProgressMilestones() {
  const m = $('#progressMilestones');
  if (!m) return;
  // 4 milestones at 25/50/75/100
  m.innerHTML = '<span></span><span></span><span></span><span></span>';
  const pct = (state.step / TOTAL) * 100;
  m.querySelectorAll('span').forEach((s, i) => {
    const at = (i + 1) * 25;
    if (pct >= at - 1) s.classList.add('passed');
  });
}

function renderQuestion() {
  topBar.hidden = false;
  navBar.hidden = false;
  const idx = state.step - 1;
  const q = QUESTIONS[idx];
  const meta = CAT_META[q.catKey] || CAT_META.info;

  $('#stepCur').textContent = pad(state.step);
  $('#stepTotal').textContent = TOTAL;
  $('#progress').style.width = ((state.step / TOTAL) * 100) + '%';
  renderProgressMilestones();

  // — Options —
  let optionHtml = '';
  if (q.type === 'text') {
    optionHtml = `<textarea class="opt-text" id="textInput" placeholder="${escapeHtml(q.placeholder || '')}">${escapeHtml(state.answers[q.id] || '')}</textarea>`;
  } else {
    const layout = q.layout === 'grid-2' ? 'grid-2' : '';
    optionHtml = `<div class="options ${layout}">${
      q.options.map((opt, i) => {
        const label = typeof opt === 'string' ? opt : opt.label;
        const desc  = typeof opt === 'object' && opt.desc ? `<span class="opt-desc">${escapeHtml(opt.desc)}</span>` : '';
        const sel = isOptionSelected(q, i) ? 'selected' : '';
        return `<button class="opt ${sel}" data-i="${i}" type="button" onclick="selectOpt(${i})">
          <span class="opt-check"><svg viewBox="0 0 16 16"><use href="#i-check"/></svg></span>
          <span class="opt-body">
            <span class="opt-label">${escapeHtml(label)}</span>
            ${desc}
          </span>
        </button>`;
      }).join('')
    }</div>`;
  }

  const imgHtml = q.img ? `<div class="q-image"></div>` : '';
  const subHtml = q.sub ? `<div class="q-sub">${escapeHtml(q.sub)}</div>` : '';

  content.innerHTML = `
    <div class="slide" style="--cat-color:${meta.color};--cat-bg:${meta.bg};--cat-border:${meta.border}">
      <div class="q-meta">
        <span class="num">${pad(state.step)}</span>
        <span class="sep">/</span>
        <span>${pad(TOTAL)}</span>
        <span class="sep">·</span>
        <span class="cat">${meta.en}</span>
      </div>
      <span class="q-badge">
        <svg><use href="#${meta.icon}"/></svg>
        ${escapeHtml(q.cat)}
      </span>
      <h2 class="q-title">${escapeHtml(q.q)}</h2>
      ${subHtml}
      ${imgHtml}
      ${optionHtml}
    </div>
  `;

  if (q.type === 'text') {
    const ta = $('#textInput');
    ta.addEventListener('input', () => { state.answers[q.id] = ta.value; updateNav(); });
  }

  updateNav();
}

function isOptionSelected(q, i) {
  const a = state.answers[q.id];
  if (a === undefined) return false;
  if (q.type === 'multi') return Array.isArray(a) && a.includes(i);
  return a === i;
}

window.selectOpt = function(i) {
  const q = QUESTIONS[state.step - 1];
  if (q.type === 'multi') {
    const cur = Array.isArray(state.answers[q.id]) ? [...state.answers[q.id]] : [];
    const at = cur.indexOf(i);
    if (at >= 0) cur.splice(at, 1); else cur.push(i);
    state.answers[q.id] = cur;
  } else {
    state.answers[q.id] = i;
  }
  renderQuestion();
  if (q.type === 'single') setTimeout(() => goNext(), 320);
};

function updateNav() {
  $('#btnPrev').disabled = state.step <= 1;
  const q = QUESTIONS[state.step - 1];
  let canNext = false;
  if (!q) canNext = true;
  else if (q.type === 'text') canNext = true;
  else if (q.type === 'multi') canNext = Array.isArray(state.answers[q.id]) && state.answers[q.id].length > 0;
  else canNext = state.answers[q.id] !== undefined;
  $('#btnNext').disabled = !canNext;
  const lbl = (state.step === TOTAL) ? '결과 보기' : '다음';
  $('#btnNext').firstChild.textContent = lbl;
}

function goNext() {
  const q = QUESTIONS[state.step - 1];
  if (!q) return;
  if (q.type === 'multi' && (!state.answers[q.id] || state.answers[q.id].length === 0)) {
    showToast('하나 이상 선택해주세요'); return;
  }
  if (q.type === 'single' && state.answers[q.id] === undefined) {
    showToast('선택해주세요'); return;
  }
  if (state.step >= TOTAL) {
    renderResult();
  } else {
    state.step++;
    renderQuestion();
    window.scrollTo({top: 0, behavior:'smooth'});
  }
}
function goPrev() {
  if (state.step <= 1) return;
  state.step--;
  renderQuestion();
  window.scrollTo({top: 0, behavior:'smooth'});
}

$('#btnNext').addEventListener('click', goNext);
$('#btnPrev').addEventListener('click', goPrev);

/* =========================================================
   8.  점수 계산 & 진단 (변경 금지)
   ========================================================= */
function calcScores() {
  const buckets = { auto:[], exp:[], col:[], ext:[], mob:[] };
  QUESTIONS.forEach(q => {
    if (!q.dim || !q.weight) return;
    const a = state.answers[q.id];
    if (a === undefined || a === null) return;
    const w = q.weight[a];
    if (typeof w !== 'number') return;
    buckets[q.dim].push(w);
  });
  const scores = {};
  for (const k in buckets) {
    const arr = buckets[k];
    scores[k] = arr.length ? Math.round(arr.reduce((a,b) => a+b, 0) / arr.length) : 0;
  }
  return scores;
}

function diagnoseType(scores) {
  const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
  const top = sorted.slice(0, 2).map(x => x[0]).sort();
  const key = top.join('-');
  return TYPE_MAP[key] || TYPE_MAP['exp-mob'];
}

function evalTag(score) {
  if (score >= 80) return { cls:'eval-strategic', txt:'전략적 개선이 필요한 단계' };
  if (score >= 50) return { cls:'eval-improve',   txt:'개선 효과가 명확한 단계' };
  return                { cls:'eval-strong',     txt:'안정적인 단계' };
}

function recommendCAD(scores) {
  const list = [];
  if (scores.exp >= 60 || scores.ext >= 60) list.push('plus');
  if (scores.mob >= 50 || scores.col >= 60) list.push('web');
  if (list.length === 0) list.push('std');
  return list.map(k => RECOS[k]);
}

/* =========================================================
   9.  COMPLETED DATA & EXPORT
   ========================================================= */
const STORAGE_KEY = 'cadDiagnosis.completed.v1';

function loadCompletedRecords() {
  try {
    const rows = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return Array.isArray(rows) ? rows : [];
  } catch (err) {
    return [];
  }
}

function saveCompletedRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function getOptionLabel(q, value) {
  if (q.type === 'text') return String(value || '').trim();
  if (q.type === 'multi') {
    return (Array.isArray(value) ? value : [])
      .map(i => {
        const opt = q.options[i];
        return typeof opt === 'string' ? opt : opt?.label;
      })
      .filter(Boolean)
      .join(', ');
  }
  const opt = q.options[value];
  return typeof opt === 'string' ? opt : opt?.label || '';
}

function buildAnswerRows() {
  return QUESTIONS.map((q, idx) => ({
    no: idx + 1,
    id: q.id,
    category: q.cat,
    question: q.q,
    answer: getOptionLabel(q, state.answers[q.id])
  }));
}

function buildDiagnosisRecord(scores, type, recos) {
  const answers = buildAnswerRows();
  const byId = Object.fromEntries(answers.map(row => [row.id, row.answer]));
  const totalScore = Math.round(Object.values(scores).reduce((a, b) => a + b, 0) / Object.keys(scores).length);
  const now = new Date();
  return {
    id: 'DX-' + now.getTime().toString(36).toUpperCase(),
    completedAt: now.toLocaleString('ko-KR', { hour12:false }),
    completedAtISO: now.toISOString(),
    userName: state.userName || '사용자',
    customer: {
      industry: byId.industry || '-',
      role: byId.role || '-',
      teamSize: byId.teamSize || '-',
      cadType: byId.cadType || '-',
      aiTarget: byId.aiTarget || '-',
      extraSvc: byId.extraSvc || '-'
    },
    scores,
    totalScore,
    type: { name:type.name, eng:type.eng, quote:type.quote },
    recommendations: recos.map(r => r.name),
    answers
  };
}

function rememberCompletedRecord(record) {
  const records = loadCompletedRecords().filter(row => row.id !== record.id);
  records.unshift(record);
  saveCompletedRecords(records.slice(0, 100));
  return record;
}

/* =========================================================
   10.  RADAR CHART (premium)
   ========================================================= */
function renderRadar(scores) {
  const dims = ['auto','exp','col','ext','mob'];
  const labels = dims.map(d => DIM_LABEL[d]);
  const values = dims.map(d => scores[d] || 0);

  const W = 400, H = 380;
  const cx = W / 2, cy = H / 2 - 6;
  const R = 116;
  const N = dims.length;
  const ang = i => (Math.PI * 2 * i / N) - Math.PI / 2;

  const polyOf = (vals, scale = 1) => vals.map((v, i) => {
    const r = (v / 100) * R * scale;
    return [cx + Math.cos(ang(i)) * r, cy + Math.sin(ang(i)) * r];
  }).map(p => p.join(',')).join(' ');

  // grid: 100% solid, others dashed
  const gridLevels = [.2, .4, .6, .8, 1];
  const grid = gridLevels.map((s, idx) => {
    const pts = Array.from({length: N}, (_, i) => {
      const r = R * s;
      return [cx + Math.cos(ang(i)) * r, cy + Math.sin(ang(i)) * r].join(',');
    }).join(' ');
    const cls = idx === gridLevels.length - 1 ? 'radar-grid-solid' : 'radar-grid-dot';
    return `<polygon class="${cls}" points="${pts}"/>`;
  }).join('');

  // axes
  const axes = labels.map((_, i) => {
    const x = cx + Math.cos(ang(i)) * R;
    const y = cy + Math.sin(ang(i)) * R;
    return `<line class="radar-axis-line" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
  }).join('');

  // data polygon (animated reveal)
  const data = `<polygon class="radar-data" points="${polyOf(values)}"/>`;

  // vertices + score pills
  const verticesHtml = values.map((v, i) => {
    const r = (v / 100) * R;
    const x = cx + Math.cos(ang(i)) * r;
    const y = cy + Math.sin(ang(i)) * r;
    return `<circle class="radar-vertex" cx="${x}" cy="${y}" r="4.5"/>`;
  }).join('');

  const pillsHtml = values.map((v, i) => {
    const r = (v / 100) * R;
    const x = cx + Math.cos(ang(i)) * r;
    const y = cy + Math.sin(ang(i)) * r;
    // offset pill toward center slightly so it doesn't overlap label
    const offX = -Math.cos(ang(i)) * 14;
    const offY = -Math.sin(ang(i)) * 14;
    return `<g transform="translate(${x + offX},${y + offY})">
      <rect class="radar-pill-bg" x="-15" y="-9" width="30" height="18" rx="9"/>
      <text class="radar-pill-text" x="0" y="0" text-anchor="middle" dy="3.5">${v}</text>
    </g>`;
  }).join('');

  // axis labels (outside)
  const labelsHtml = labels.map((lab, i) => {
    const lr = R + 32;
    const x = cx + Math.cos(ang(i)) * lr;
    const y = cy + Math.sin(ang(i)) * lr;
    let anchor = 'middle';
    const ax = Math.cos(ang(i));
    if (ax > .25) anchor = 'start';
    else if (ax < -.25) anchor = 'end';

    const parts = lab.kor.split('·');
    if (parts.length === 2) {
      return `<g>
        <text class="radar-axis-label" x="${x}" y="${y - 6}" text-anchor="${anchor}">${parts[0]}·</text>
        <text class="radar-axis-label" x="${x}" y="${y + 8}" text-anchor="${anchor}">${parts[1]}</text>
        <text class="radar-axis-label-en" x="${x}" y="${y + 22}" text-anchor="${anchor}">${lab.en}</text>
      </g>`;
    }
    return `<g>
      <text class="radar-axis-label" x="${x}" y="${y + 2}" text-anchor="${anchor}">${lab.kor}</text>
      <text class="radar-axis-label-en" x="${x}" y="${y + 16}" text-anchor="${anchor}">${lab.en}</text>
    </g>`;
  }).join('');

  // guide texts (100 / 50 markers on top axis)
  const topX = cx, topY = cy - R;
  const midY = cy - R * 0.5;
  const guides = `
    <text class="radar-guide" x="${topX + 8}" y="${topY + 4}">100</text>
    <text class="radar-guide" x="${topX + 8}" y="${midY + 4}">50</text>
  `;

  return `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="radarGrad" cx="50%" cy="50%" r="58%">
          <stop offset="0%" stop-color="#ff2e63" stop-opacity=".42"/>
          <stop offset="60%" stop-color="#ff2e63" stop-opacity=".22"/>
          <stop offset="100%" stop-color="#ff2e63" stop-opacity=".06"/>
        </radialGradient>
      </defs>
      ${grid}
      ${axes}
      ${guides}
      ${data}
      ${verticesHtml}
      ${pillsHtml}
      ${labelsHtml}
    </svg>
  `;
}

/* =========================================================
   10.  COUNT-UP ANIMATION
   ========================================================= */
function countUp(el, to, duration = 1200) {
  const start = performance.now();
  const from = 0;
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const e = 1 - Math.pow(1 - t, 3); // ease-out-cubic
    el.textContent = Math.round(from + (to - from) * e);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = to;
  }
  requestAnimationFrame(tick);
}

/* =========================================================
   11.  RESULT
   ========================================================= */
function renderResult(shouldSave = true) {
  const scores = calcScores();
  const type = diagnoseType(scores);
  const recos = recommendCAD(scores);
  if (shouldSave || !state.currentRecord) {
    state.currentRecord = rememberCompletedRecord(buildDiagnosisRecord(scores, type, recos));
  }

  topBar.hidden = true;
  navBar.hidden = true;

  // — Score order matches PDF —
  const order = ['auto','exp','ext','mob','col'];

  const rows = order.map(k => {
    const s = scores[k] || 0;
    const ev = evalTag(s);
    const milestones = [1,2,3,4].map(() => '<span></span>').join('');
    return `
      <div class="score-row reveal" data-d="${order.indexOf(k) + 1}">
        <div class="score-label-wrap">
          <div class="score-label">${DIM_SHORT[k].kor}</div>
          <div class="score-label-en">${DIM_SHORT[k].en}</div>
        </div>
        <div>
          <div class="score-bar">
            <div class="score-bar-track">
              <div class="score-bar-fill" data-w="${s}"></div>
              <div class="score-bar-milestones">${milestones}</div>
            </div>
          </div>
          <div class="score-eval ${ev.cls}">${ev.txt}</div>
        </div>
        <div class="score-num" data-target="${s}">0</div>
      </div>
    `;
  }).join('');

  const recoHtml = recos.map((r, idx) => {
    const isAccent = r.accent;
    const chips = r.chips.map((c, i) => {
      const accent = isAccent && i === 0 ? 'chip-accent' : '';
      return `<span class="chip ${accent}">${escapeHtml(c)}</span>`;
    }).join('');
    return `
      <div class="reco-card reveal" data-d="${idx + 1}">
        <div class="reco-header">
          <div class="reco-logo">${r.icon}</div>
          <div class="reco-title">
            <div class="reco-name">${escapeHtml(r.name)}</div>
            <div class="reco-tagline">${escapeHtml(r.tagline)}</div>
          </div>
        </div>
        <div class="reco-body">
          <p class="reco-desc">${escapeHtml(r.desc)}</p>
          <div class="reco-chips">${chips}</div>
          <button class="reco-cta" type="button">
            자세히 알아보기
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8 L13 8 M9 4 L13 8 L9 12"/></svg>
          </button>
        </div>
      </div>
    `;
  }).join('');

  // Drop cap on body first paragraph
  const bodyHtml = type.body
    .split('\n')
    .map(s => s.trim())
    .filter(Boolean)
    .map((p, i) => i === 0 ? `<p><span class="dropcap">${p[0]}</span>${p.slice(1)}</p>` : `<p>${p}</p>`)
    .join('');

  content.innerHTML = `
    <div class="slide result">

      <!-- HERO -->
      <div class="r-hero">
        <div class="r-hero-eyebrow reveal"><b>DIAGNOSIS</b> · COMPLETE</div>
        <div class="r-hero-name reveal" data-d="1"><b>${escapeHtml(state.userName)}</b>님의 설계 진단 결과</div>
        <div class="r-hero-type reveal" data-d="2"><em>${escapeHtml(type.name)}</em>형</div>
        <div class="r-hero-eng reveal" data-d="3">${escapeHtml(type.eng)}</div>
      </div>

      <!-- 1. CHART -->
      <section class="r-section">
        <div class="r-section-head">
          <div class="r-section-title">핵심 요약 지표</div>
          <div class="r-section-num">01 / 03</div>
        </div>
        <div class="r-card reveal">
          <div class="r-card-pad">
            <div class="radar-head">
              <div class="radar-head-title">5-Dimension Profile</div>
              <div class="radar-head-tag">RADAR · 0-100</div>
            </div>
            <div class="radar-wrap">${renderRadar(scores)}</div>
            <div class="radar-legend">
              <span><span class="radar-legend-dot"></span>Your Score</span>
              <span>Max 100</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 2. SCORES -->
      <section class="r-section">
        <div class="r-section-head">
          <div class="r-section-title">항목별 점수 및 분석</div>
          <div class="r-section-num">02 / 03</div>
        </div>
        <div class="r-card">
          <div class="r-card-pad">
            <div class="scores">${rows}</div>
          </div>
        </div>
      </section>

      <!-- 3. SUMMARY -->
      <section class="r-section">
        <div class="r-section-head">
          <div class="r-section-title">종합 진단평</div>
          <div class="r-section-num">03 / 03</div>
        </div>
        <div class="r-card reveal">
          <div class="summary">
            <div class="summary-quote-mark">"</div>
            <div class="summary-emoji">${type.emoji}</div>
            <div class="summary-eng"><em>${escapeHtml(type.eng)}</em></div>
            <div class="summary-kor">${escapeHtml(type.name)}형</div>
            <div class="summary-quote">${escapeHtml(type.quote)}</div>
            <div class="summary-body">${bodyHtml}</div>
          </div>
        </div>
      </section>

      <!-- RECOMMENDATIONS -->
      <section class="r-section">
        <div class="r-section-head">
          <div class="r-section-title">맞춤 CAD 솔루션</div>
          <div class="r-section-num">RECO</div>
        </div>
        <div class="reco-grid">${recoHtml}</div>
      </section>

      <!-- ACTIONS -->
      <div class="actions">
        <button class="btn btn-secondary" onclick="window.print()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5 V2 h8 v3 M4 12 H2 V8 a1 1 0 011-1 h10 a1 1 0 011 1 v4 h-2 M4 10 h8 v4 H4 z"/></svg>
          결과 인쇄
        </button>
        <button class="btn btn-secondary" onclick="restart()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8 a6 6 0 1011-3.5 M13 2 v3 h-3"/></svg>
          처음으로
        </button>
      </div>

    </div>
  `;

  // Animate score bars + count-up
  setTimeout(() => {
    $$('.score-bar-fill').forEach(b => b.style.width = b.dataset.w + '%');
    $$('.score-num').forEach(el => countUp(el, parseInt(el.dataset.target, 10) || 0));
  }, 240);

  setupReveal();
  window.scrollTo({top: 0, behavior:'smooth'});
}

window.restart = function() {
  state.step = 0;
  state.answers = {};
  state.userName = '사용자';
  state.currentRecord = null;
  renderIntro();
  window.scrollTo({top: 0});
};

/* =========================================================
   12.  KEYBOARD
   ========================================================= */
document.addEventListener('keydown', e => {
  if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (!navBar.hidden && !$('#btnNext').disabled) goNext();
  }
  if (e.key === 'ArrowLeft') {
    if (!navBar.hidden && !$('#btnPrev').disabled) goPrev();
  }
});

/* =========================================================
   INIT
   ========================================================= */
renderIntro();
</script>
